<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SocietyConnect</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>SocietyConnect</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h2>Resident Registration</h2>
            <form action="login.html" method="GET">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>
                
                <div class="form-group">
                    <label for="flat">Flat / House Number</label>
                    <input type="text" id="flat" name="flat" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="text" id="mobile" name="mobile" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required class="form-input">
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required class="form-input">
                </div>

                <div class="form-group">
                    <label>Resident Type</label>
                    <div class="radio-group">
                        <div>
                            <input type="radio" id="owner" name="resident_type" value="owner" required>
                            <label for="owner">Owner</label>
                        </div>
                        <div>
                            <input type="radio" id="tenant" name="resident_type" value="tenant">
                            <label for="tenant">Tenant</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn">Register</button>
            </form>
        </div>
    </main>
</body>
</html>
