<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SocietyConnect</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>SocietyConnect</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="register.html">Register</a>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h2>Resident Login</h2>
            <form action="dashboard.html" method="GET">
                <div class="form-group">
                    <label for="login-id">Email or Mobile Number</label>
                    <input type="text" id="login-id" name="login-id" required>
                </div>
                
                <div class="form-group">
                    <label for="login-pass">Password</label>
                    <input type="password" id="login-pass" name="login-pass" required class="form-input">
                </div>

                <button type="submit" class="btn" style="width: 100%; margin-bottom: 1rem;">Login</button>
                
                <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
                    <a href="#" style="color: #3498db; text-decoration: none;">Forgot password?</a>
                    <a href="register.html" style="color: #3498db; text-decoration: none;">Don't have an account? Register</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
